# Change prefix key from C-b to C-t
unbind-key C-b
set-option -g prefix C-t
# Send C-t to terminal by pressing C-t twice
bind-key C-t send-prefix

# Pane navigation
bind-key n select-pane -t :.+  # next pane
bind-key p select-pane -t :.-  # previous pane

# Pane splitting
bind-key 2 split-window -v  # split top/bottom
bind-key 3 split-window -h  # split left/right

# Close pane
bind-key q kill-pane

# Pane resizing (repeatable)
bind-key -r > resize-pane -R 5  # expand right
bind-key -r < resize-pane -L 5  # shrink left
bind-key -r + resize-pane -D 5  # expand down
bind-key -r - resize-pane -U 5  # shrink up

# Enable mouse (click to select pane, drag to resize)
set-option -g mouse on

# Word separators: space only (do not break on . or -)
set-option -g word-separators ' '

# Double-click to select word and copy to clipboard
bind-key -n DoubleClick1Pane copy-mode \; send -X select-word \; send -X copy-pipe "pbcopy" \; display-message "Copied: #{buffer_sample}" \; send -X cancel

# On new session: split left pane top/bottom, leave right pane as single
set-hook -g after-new-session 'split-window -h ; select-pane -L ; split-window -v ; select-pane -U'
