# プレフィックスキーを C-b から C-t に変更
unbind-key C-b
set-option -g prefix C-t
# C-t を2回押すと C-t をターミナルに送信
bind-key C-t send-prefix

# ペイン移動
bind-key n select-pane -t :.+  # 次のペインへ
bind-key p select-pane -t :.-  # 前のペインへ

# ペイン分割
bind-key 2 split-window -v  # 上下に分割
bind-key 3 split-window -h  # 左右に分割

# ペインを閉じる
bind-key q kill-pane

# ペインリサイズ（連続入力可）
bind-key -r > resize-pane -R 5  # 右に広げる
bind-key -r < resize-pane -L 5  # 左に縮める
bind-key -r + resize-pane -D 5  # 下に広げる
bind-key -r - resize-pane -U 5  # 上に縮める

# マウス操作を有効化（クリックでペイン選択、ドラッグでリサイズ）
set-option -g mouse on

# 単語区切りをスペースのみに（.や-で切らない）
set-option -g word-separators ' '

# ダブルクリックで単語選択してクリップボードにコピー
bind-key -n DoubleClick1Pane copy-mode \; send -X select-word \; send -X copy-pipe "pbcopy" \; display-message "Copied: #{buffer_sample}" \; send -X cancel

# 新規セッション起動時に左ペインを上下分割・右ペインは1つのレイアウトを自動構成
set-hook -g after-new-session 'split-window -h ; select-pane -L ; split-window -v ; select-pane -U'
